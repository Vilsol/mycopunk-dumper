name: release

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Run the pipeline even if the Steam buildid is unchanged"
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      MYCOPUNK_APPID: "3247750"
      # The depot ID for the Linux/Windows build of Mycopunk. Confirm by running
      # DepotDownloader without -depot once locally; it prints the depot list.
      MYCOPUNK_DEPOT_ID: "3247751"
      MYCOPUNK_DIR: ${{ github.workspace }}/_game
      PROTON_VERSION: "GE-Proton10-34"
      BEPINEX_VERSION: "5.4.23.5"
      DEPOTDOWNLOADER_VERSION: "3.4.0"
      # gbe_fork (maintained Goldberg Steam Emu fork). The drop-in replacement
      # for steam_api64.dll lets Mycopunk's Steamworks calls succeed without
      # a real Steam client — otherwise SteamAPI_Init() tries to load
      # C:\Program Files (x86)\Steam\steamclient64.dll, fails, and the game's
      # init chain NREs all the way through Global.Instance.
      GBE_VERSION: "release-2026_04_25"
      # umu-launcher mimics Steam's Linux runtime container so Proton tools
      # like Xalia find the libraries they expect, instead of failing on the
      # host with "Video driver  not supported". Documented as the headless
      # path for "Steam game without Steam".
      UMU_VERSION: "1.4.0"
      STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
      STEAM_PASSWORD: ${{ secrets.STEAM_PASSWORD }}
    steps:
      - name: Checkout dumper
        uses: actions/checkout@v4
        with:
          path: dumper

      - name: Checkout mycopunk-data
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/mycopunk-data
          path: mycopunk-data
          ssh-key: ${{ secrets.MYCOPUNK_DATA_DEPLOY_KEY }}
          persist-credentials: true

      - name: System packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xvfb wine64 jq unzip p7zip-full ca-certificates \
            libnss3 libsdl2-2.0-0 libudev1 libxi6 libxinerama1 libxcursor1 \
            libxrandr2 libxext6 libxrender1 libgbm1 libasound2 libpulse0

      - name: Install mise
        uses: jdx/mise-action@v2
        with:
          working_directory: dumper

      - name: Install dotnet@6 + ilspycmd
        working-directory: dumper
        run: |
          mise install dotnet@6
          DOTNET_SYSTEM_GLOBALIZATION_INVARIANT=1 mise exec dotnet@6 -- \
            dotnet tool install -g --version 8.2.0.7535 ilspycmd
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Cache DepotDownloader
        id: cache-dd
        uses: actions/cache@v4
        with:
          path: ~/tools/DepotDownloader
          key: depotdownloader-${{ env.DEPOTDOWNLOADER_VERSION }}

      - name: Install DepotDownloader
        if: steps.cache-dd.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/tools/DepotDownloader
          curl -fL -o /tmp/dd.zip \
            "https://github.com/SteamRE/DepotDownloader/releases/download/DepotDownloader_${DEPOTDOWNLOADER_VERSION}/DepotDownloader-linux-x64.zip"
          unzip /tmp/dd.zip -d ~/tools/DepotDownloader
          chmod +x ~/tools/DepotDownloader/DepotDownloader

      - name: Configure DepotDownloader path
        run: |
          echo "DEPOTDOWNLOADER_BIN=$HOME/tools/DepotDownloader/DepotDownloader" >> "$GITHUB_ENV"

      - name: Get current Steam manifest gid
        id: manifest
        working-directory: dumper
        run: |
          MID="$(mise run ci-buildid 2>/dev/null | tail -1)"
          echo "Current Steam manifest gid: $MID"
          echo "current=$MID" >> "$GITHUB_OUTPUT"

      - name: Get last published Steam manifest gid
        id: published
        run: |
          LAST="$(jq -r '
            (.latest // "") as $l |
            (.versions[]? | select(.version == $l) | .steamManifestId) // ""
          ' mycopunk-data/index.json)"
          echo "Last published Steam manifest gid: ${LAST:-<none>}"
          echo "last=$LAST" >> "$GITHUB_OUTPUT"

      - name: Decide whether to run
        id: gate
        run: |
          if [ "${{ inputs.force }}" = "true" ]; then
            echo "Running because force=true"
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif [ -z "${{ steps.published.outputs.last }}" ]; then
            echo "No previous steamManifestId in index.json — running"
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.manifest.outputs.current }}" != "${{ steps.published.outputs.last }}" ]; then
            echo "Manifest changed: ${{ steps.published.outputs.last }} -> ${{ steps.manifest.outputs.current }}"
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Manifest unchanged at ${{ steps.manifest.outputs.current }} — skipping"
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download game depot
        if: steps.gate.outputs.run == 'true'
        run: |
          mkdir -p "$MYCOPUNK_DIR"
          "$DEPOTDOWNLOADER_BIN" \
            -app "$MYCOPUNK_APPID" \
            -depot "$MYCOPUNK_DEPOT_ID" \
            -username "$STEAM_USERNAME" \
            -password "$STEAM_PASSWORD" \
            -os linux \
            -dir "$MYCOPUNK_DIR"

      - name: Cache Proton-GE
        if: steps.gate.outputs.run == 'true'
        id: cache-proton
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/proton
          key: proton-${{ env.PROTON_VERSION }}

      - name: Install Proton-GE
        if: steps.gate.outputs.run == 'true' && steps.cache-proton.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$RUNNER_TEMP/proton"
          curl -fL -o /tmp/proton.tar.gz \
            "https://github.com/GloriousEggroll/proton-ge-custom/releases/download/${PROTON_VERSION}/${PROTON_VERSION}.tar.gz"
          tar -xzf /tmp/proton.tar.gz -C "$RUNNER_TEMP/proton" --strip-components=1

      - name: Cache BepInEx
        if: steps.gate.outputs.run == 'true'
        id: cache-bepinex
        uses: actions/cache@v4
        with:
          path: ~/tools/bepinex.zip
          key: bepinex-${{ env.BEPINEX_VERSION }}

      - name: Cache umu-launcher binary
        if: steps.gate.outputs.run == 'true'
        id: cache-umu
        uses: actions/cache@v4
        with:
          path: ~/tools/umu
          key: umu-${{ env.UMU_VERSION }}

      - name: Install umu-launcher
        if: steps.gate.outputs.run == 'true'
        run: |
          if [ ! -x ~/tools/umu/umu-run ]; then
            mkdir -p ~/tools/umu
            curl -fL -o /tmp/umu.tar \
              "https://github.com/Open-Wine-Components/umu-launcher/releases/download/${UMU_VERSION}/umu-launcher-${UMU_VERSION}-zipapp.tar"
            tar -xf /tmp/umu.tar -C ~/tools/umu --strip-components=1
            chmod +x ~/tools/umu/umu-run
          fi
          echo "UMU_RUN=$HOME/tools/umu/umu-run" >> $GITHUB_ENV

      - name: Cache umu Steam runtime download
        if: steps.gate.outputs.run == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.local/share/umu
          key: umu-runtime-${{ env.UMU_VERSION }}

      - name: Install BepInEx into game dir
        if: steps.gate.outputs.run == 'true'
        run: |
          mkdir -p ~/tools
          if [ ! -f ~/tools/bepinex.zip ]; then
            curl -fL -o ~/tools/bepinex.zip \
              "https://github.com/BepInEx/BepInEx/releases/download/v${BEPINEX_VERSION}/BepInEx_win_x64_${BEPINEX_VERSION}.zip"
          fi
          unzip -o ~/tools/bepinex.zip -d "$MYCOPUNK_DIR"
          mkdir -p "$MYCOPUNK_DIR/BepInEx/plugins" "$MYCOPUNK_DIR/BepInEx/config"
          # Force-flush every log line to disk so we don't lose plugin output if
          # the game is killed before BepInEx's flush timer fires. AppendLog=false
          # so each run starts fresh. Console.Enabled forwards plugin logs to
          # the game's stderr, which xvfb-run/proton bubbles back to the workflow.
          cat > "$MYCOPUNK_DIR/BepInEx/config/BepInEx.cfg" <<'CFG'
          [Logging.Console]
          Enabled = true

          [Logging.Disk]
          WriteUnityLog = true
          AppendLog = false
          CFG

      - name: Cache gbe_fork steam_api64.dll
        if: steps.gate.outputs.run == 'true'
        id: cache-gbe
        uses: actions/cache@v4
        with:
          path: ~/tools/gbe
          key: gbe-${{ env.GBE_VERSION }}

      - name: Install gbe_fork steam_api64.dll into game dir
        if: steps.gate.outputs.run == 'true'
        run: |
          if [ ! -f ~/tools/gbe/steam_api64.dll ]; then
            mkdir -p ~/tools/gbe /tmp/gbe-extract
            curl -fL -o /tmp/gbe.7z \
              "https://github.com/Detanup01/gbe_fork/releases/download/${GBE_VERSION}/emu-win-release.7z"
            7z x -y /tmp/gbe.7z -o/tmp/gbe-extract release/regular/x64/steam_api64.dll
            cp /tmp/gbe-extract/release/regular/x64/steam_api64.dll ~/tools/gbe/steam_api64.dll
          fi
          # Replace every steam_api64.dll under the game dir. Unity ships its
          # native plugins in Mycopunk_Data/Plugins/x86_64/ but some games also
          # drop a copy next to the .exe — replace whatever's there.
          replaced=0
          while IFS= read -r -d '' f; do
            cp ~/tools/gbe/steam_api64.dll "$f"
            echo "Replaced: $f"
            replaced=$((replaced + 1))
          done < <(find "$MYCOPUNK_DIR" -name "steam_api64.dll" -print0)
          if [ "$replaced" -eq 0 ]; then
            echo "WARNING: no steam_api64.dll found in $MYCOPUNK_DIR — placing one next to Mycopunk.exe as a fallback" >&2
            cp ~/tools/gbe/steam_api64.dll "$MYCOPUNK_DIR/steam_api64.dll"
          fi

      - name: Configure gbe_fork branches.json with real Steam build_id
        if: steps.gate.outputs.run == 'true'
        run: |
          # Without a steam_settings/branches.json, gbe_fork's SteamApps.BuildId()
          # returns its hardcoded fallback (10), making the dump's gameVersion.BuildID
          # useless. Fetch the real public-branch build_id from Steam (anonymous
          # AppInfo, no auth needed for public app metadata) and write a proper
          # branches.json next to the emu DLL so Global.BuildID returns the real value.
          python3 -m pip install --user --quiet 'steam[client]'
          SETTINGS_DIR="$MYCOPUNK_DIR/Mycopunk_Data/Plugins/x86_64/steam_settings"
          mkdir -p "$SETTINGS_DIR"
          python3 - "$SETTINGS_DIR/branches.json" "$MYCOPUNK_APPID" <<'PY'
          import json, sys, time
          from steam.client import SteamClient
          out_path, appid = sys.argv[1], int(sys.argv[2])
          c = SteamClient()
          if not c.anonymous_login():
              raise SystemExit("anonymous Steam login failed")
          info = c.get_product_info(apps=[appid])
          branches = info["apps"][appid]["depots"]["branches"]
          out = []
          for name, data in branches.items():
              out.append({
                  "name": name,
                  "description": data.get("description", ""),
                  "protected": "pwdrequired" in data,
                  "build_id": int(data.get("buildid", 0)),
                  "time_updated": int(data.get("timeupdated", time.time())),
              })
          with open(out_path, "w") as f:
              json.dump(out, f, indent=2)
          public = next((b["build_id"] for b in out if b["name"] == "public"), None)
          print(f"Wrote {out_path}: {len(out)} branches; public build_id={public}")
          PY

      - name: Run release pipeline
        if: steps.gate.outputs.run == 'true'
        working-directory: dumper
        env:
          DUMP_TASK: ci-dump
          STEAM_MANIFEST_ID: ${{ steps.manifest.outputs.current }}
          # force=true means re-run despite an unchanged buildid; also overwrite
          # an already-published version instead of bailing.
          FORCE_RELEASE: ${{ inputs.force }}
          # AssetRipper is a local-only step; CI never has it installed.
          SKIP_ASSETS: "1"
          PROTON_DIR: ${{ runner.temp }}/proton
          # UMU_RUN is exported into GITHUB_ENV by the "Install umu-launcher" step
        run: |
          mise run release-version "${{ github.workspace }}/mycopunk-data"

      - name: Commit and push to mycopunk-data
        if: steps.gate.outputs.run == 'true'
        working-directory: mycopunk-data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data schema/data.schema.json index.json _redirects
          if git diff --cached --quiet; then
            echo "No changes to publish."
            exit 0
          fi
          VERSION="$(jq -r .latest index.json)"
          BUILD_ID="$(jq -r --arg v "$VERSION" '.versions[] | select(.version==$v) | .buildId' index.json)"
          git commit -m "release $VERSION (build $BUILD_ID)"
          git push origin HEAD:main

      - name: Upload diagnostics on failure
        if: failure() && steps.gate.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: diagnostics-${{ github.run_id }}
          path: |
            ${{ env.MYCOPUNK_DIR }}/BepInEx/LogOutput.log
            ${{ env.MYCOPUNK_DIR }}/unity.log
            ${{ env.MYCOPUNK_DIR }}/data.json
          if-no-files-found: ignore
          retention-days: 90
